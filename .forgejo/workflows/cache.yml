name: push nix cache

on:
  push:
    branches:
      - master

jobs:
  cache:
    runs-on: native-x86_64-linux
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: nix run .#cache -L --accept-flake-config
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}

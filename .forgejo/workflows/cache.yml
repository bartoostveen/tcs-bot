name: push nix cache

on:
  push:
    branches:
      - master

jobs:
  cache:
    runs-on: native-x86_64-linux
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: nix run .#cache -L --accept-flake-config
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}

name: push nix cache

on:
  push:
    branches:
      - master

jobs:
  cache:
    runs-on: native-x86_64-linux
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: nix run .#cache -L --accept-flake-config
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
